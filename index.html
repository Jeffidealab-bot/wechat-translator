<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeChat Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #f0ede8;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    width: 100%; max-width: 560px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .top-bar {
    background: #07c160;
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar-left { display: flex; align-items: center; gap: 10px; }
  .wc-icon { width: 28px; height: 28px; fill: white; }
  .top-title { color: white; font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }
  .top-sub { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 1px; }
  .clear-btn {
    background: rgba(255,255,255,0.2); border: none; border-radius: 6px;
    color: white; font-size: 11px; font-family: inherit;
    padding: 5px 10px; cursor: pointer; letter-spacing: 0.03em;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.3); }

  .api-section {
    background: #fafafa; border-bottom: 1px solid #eee;
    padding: 12px 20px; display: flex; align-items: center; gap: 8px;
  }
  .api-label { font-size: 11px; color: #888; white-space: nowrap; }
  .api-input {
    flex: 1; font-family: inherit; font-size: 12px;
    border: 1px solid #ddd; border-radius: 6px;
    padding: 6px 10px; background: #fff; color: #333; outline: none;
  }
  .api-input:focus { border-color: #07c160; }
  .api-save {
    font-family: inherit; font-size: 11px;
    background: #07c160; color: white; border: none;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; white-space: nowrap;
  }
  .api-save:hover { background: #06ae56; }
  .api-status { font-size: 11px; color: #07c160; white-space: nowrap; min-width: 50px; }

  .tone-bar {
    padding: 10px 20px; display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid #eee; flex-wrap: wrap;
  }
  .tone-label-txt { font-size: 11px; color: #999; margin-right: 2px; }
  .chip {
    font-family: inherit; font-size: 11px;
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer;
  }
  .chip.active { background: #07c160; color: white; border-color: #07c160; }
  .chip:hover:not(.active) { border-color: #bbb; }

  .feed {
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 120px; max-height: 440px; overflow-y: auto;
  }
  .empty-state { font-size: 12px; color: #bbb; text-align: center; padding: 24px 0; }

  .item { background: #f7f7f5; border-radius: 10px; padding: 12px 14px; border: 1px solid #eee; }
  .item-en { font-size: 11px; color: #999; margin-bottom: 8px; }
  .item-bottom { display: flex; align-items: center; gap: 10px; }
  .item-zh {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 17px; color: #111; flex: 1; line-height: 1.6;
  }
  .copy-btn {
    flex-shrink: 0; font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover:not(:disabled) { border-color: #07c160; color: #07c160; }
  .copy-btn.copied { background: #07c160; color: white; border-color: #07c160; }
  .copy-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .err-msg { font-size: 11px; color: #e53e3e; margin-top: 6px; }

  .dots span {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: #bbb;
    animation: blink 1.2s infinite; margin: 0 2px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

  .input-area { border-top: 1px solid #eee; padding: 14px 20px; display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none;
    border: 1px solid #ddd; border-radius: 10px;
    padding: 10px 13px; font-size: 13px; font-family: inherit;
    background: #fff; color: #111; line-height: 1.5;
    min-height: 44px; max-height: 160px; outline: none;
  }
  textarea:focus { border-color: #07c160; }
  textarea::placeholder { color: #bbb; }
  .send-btn {
    width: 44px; height: 44px; background: #07c160; border: none;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:hover { background: #06ae56; }
  .send-btn:disabled { background: #ccc; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .hint { font-size: 10px; color: #ccc; padding: 0 20px 12px; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="top-bar-left">
      <svg class="wc-icon" viewBox="0 0 24 24">
        <path d="M9.5 4C5.36 4 2 6.92 2 10.5c0 2.05 1.1 3.87 2.82 5.07L4 18l2.5-1.25c.94.27 1.94.5 3 .5C9.2 17 9 16.26 9 15.5 9 11.36 12.86 8 17.5 8c.18 0 .34.01.5.02C17.12 5.67 13.59 4 9.5 4z"/>
        <path d="M17.5 10c-3.31 0-6 2.24-6 5s2.69 5 6 5c.87 0 1.7-.18 2.44-.5L22 21l-.75-2.63C22.37 17.37 23 16.26 23 15c0-2.76-2.69-5-5.5-5z"/>
      </svg>
      <div>
        <div class="top-title">WeChat Translator</div>
        <div class="top-sub">English → Simplified Chinese</div>
      </div>
    </div>
    <button class="clear-btn" onclick="clearAll()">CLEAR</button>
  </div>

  <div class="api-section">
    <span class="api-label">API KEY</span>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-..." />
    <button class="api-save" onclick="saveKey()">SAVE</button>
    <span class="api-status" id="apiStatus"></span>
  </div>

  <div class="tone-bar">
    <span class="tone-label-txt">TONE</span>
    <button class="chip active" data-tone="curt" onclick="setTone(this)">Curt & polite</button>
    <button class="chip" data-tone="formal" onclick="setTone(this)">Formal</button>
    <button class="chip" data-tone="friendly" onclick="setTone(this)">Friendly</button>
    <button class="chip" data-tone="casual" onclick="setTone(this)">Casual</button>
  </div>

  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">Paste your API key above, then type to translate.</div>
  </div>

  <div class="input-area">
    <textarea id="inp" placeholder="Type your message in English…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="doTranslate()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">ENTER to send &nbsp;·&nbsp; SHIFT+ENTER for new line</div>

</div>

<script>
  let currentTone = 'curt';
  let apiKey = localStorage.getItem('wct_key') || '';

  const tonePrompts = {
    curt:     'You are a translation engine. Translate the user\'s English message into Simplified Chinese for WeChat. Be brief, concise, and polite. Output ONLY the Chinese translation — absolutely nothing else. No pinyin, no explanation, no commentary.',
    formal:   'You are a translation engine. Translate the user\'s English message into formal, respectful Simplified Chinese for WeChat. Output ONLY the Chinese translation — absolutely nothing else.',
    friendly: 'You are a translation engine. Translate the user\'s English message into warm, friendly Simplified Chinese for WeChat. Output ONLY the Chinese translation — absolutely nothing else.',
    casual:   'You are a translation engine. Translate the user\'s English message into casual, conversational Simplified Chinese for WeChat. Output ONLY the Chinese translation — absolutely nothing else.'
  };

  if (apiKey) {
    document.getElementById('apiKey').value = apiKey;
    document.getElementById('apiStatus').textContent = '✓ saved';
    document.getElementById('emptyState').textContent = 'Type a message to translate.';
  }

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('wct_key', val);
    document.getElementById('apiStatus').textContent = '✓ saved';
    const es = document.getElementById('emptyState');
    if (es) es.textContent = 'Type a message to translate.';
  }

  function setTone(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentTone = el.dataset.tone;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(); }
  }

  function clearAll() {
    document.getElementById('feed').innerHTML = '<div class="empty-state" id="emptyState">Type a message to translate.</div>';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function doCopy(zh, btn) {
    try {
      await navigator.clipboard.writeText(zh);
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = zh;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    btn.classList.add('copied');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1800);
  }

  async function doTranslate() {
    if (!apiKey) { alert('Please paste your Anthropic API key and click SAVE first.'); return; }
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;

    document.getElementById('emptyState')?.remove();
    inp.value = '';
    inp.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    const feed = document.getElementById('feed');
    const id = 'i' + Date.now();
    const item = document.createElement('div');
    item.className = 'item';
    item.id = id;
    item.innerHTML = `
      <div class="item-en">${esc(text)}</div>
      <div class="item-bottom">
        <div class="item-zh"><span class="dots"><span></span><span></span><span></span></span></div>
        <button class="copy-btn" disabled>Copy</button>
      </div>`;
    feed.appendChild(item);
    feed.scrollTop = feed.scrollHeight;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: tonePrompts[currentTone],
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'HTTP ' + res.status);

      const zh = data.content
        ?.map(b => b.type === 'text' ? b.text : '')
        .join('')
        .trim();

      if (!zh) throw new Error('Empty response from API');

      const el = document.getElementById(id);
      el.querySelector('.item-zh').textContent = zh;
      const btn = el.querySelector('.copy-btn');
      btn.disabled = false;
      btn.onclick = () => doCopy(zh, btn);

    } catch(err) {
      const el = document.getElementById(id);
      if (el) {
        el.querySelector('.item-zh').textContent = '';
        el.querySelector('.item-bottom').insertAdjacentHTML('afterend',
          `<div class="err-msg">Error: ${esc(String(err.message))}</div>`);
      }
    }

    document.getElementById('sendBtn').disabled = false;
    feed.scrollTop = feed.scrollHeight;
  }
</script>
</body>
</html>
